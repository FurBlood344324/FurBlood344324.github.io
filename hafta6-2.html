<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odev 6 - Birim Dönüştürücü</title>
    <link rel="stylesheet" href="styles/hafta6-2.css">
</head>
<body>
    <main class="converter-app">
        <section class="converter-card" aria-labelledby="converter-title">
            <p class="eyebrow">Uygulama 2 - <a href="hafta6.html" style="color: inherit; text-decoration: underline;">Uygulama 1'e Dön (Not Hesaplama)</a></p>
            <h1 id="converter-title">Birim Dönüştürücü</h1>
            <p class="intro">Sıcaklık, uzunluk ve kütle dönüşümleri arasından seçim yaparak değeri anında dönüştürün.</p>

            <form id="converter-form" class="converter-form" novalidate>
                <label>
                    <span>Deger Giriniz</span>
                    <input id="conversion-value" type="text" inputmode="decimal" placeholder="Ornek: 50" required>
                </label>

                <label>
                    <span>Dönüşüm Tipi</span>
                    <select id="conversion-type" required>
                        <option value="c-to-f">Celsius -> Fahrenheit</option>
                        <option value="f-to-c">Fahrenheit -> Celsius</option>
                        <option value="m-to-km">Metre -> Kilometre</option>
                        <option value="km-to-m">Kilometre -> Metre</option>
                        <option value="kg-to-g">Kilogram -> Gram</option>
                        <option value="g-to-kg">Gram -> Kilogram</option>
                    </select>
                </label>

                <button type="submit">Donustur</button>
                <p id="converter-error" class="error-message" aria-live="polite"></p>
            </form>

            <section id="converter-result" class="result-card" aria-live="polite">
                <p class="result-label">Sonuc</p>
                <p class="result-value"><span id="converted-value">-</span></p>
                <p id="conversion-summary" class="result-summary">Bir dönüşüm seçip hesaplayın.</p>
            </section>
        </section>
    </main>

    <script src="scripts/hafta6-2.js"></script>
</body>
</html>
